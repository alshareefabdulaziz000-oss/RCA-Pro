<!DOCTYPE html>

<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RCA Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a2332}
header{background:linear-gradient(135deg,#0c4a6e,#075985);color:#fff;padding:18px;text-align:center}
header h1{font-size:18px}header p{font-size:11px;opacity:.85;margin-top:4px}
.w{max-width:640px;margin:0 auto;padding:12px}
.c{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ct{font-size:13px;font-weight:700;color:#0c4a6e;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #0ea5e9}
.r{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.rf{grid-template-columns:1fr}.r3{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:11px;font-weight:600;color:#475569;margin-bottom:3px}
input,select,textarea{width:100%;padding:9px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;background:#f8fafc;font-family:inherit}
textarea{min-height:50px}
.sr{display:grid;grid-template-columns:110px 1fr;gap:6px;margin-bottom:5px;align-items:center}
.sr span{font-size:11px;color:#64748b;font-weight:600}
.capa-opt{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#1e293b;line-height:1.4;padding:8px 10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer}
.capa-opt:hover{background:#f1f5f9;border-color:#0ea5e9}
.capa-opt input{margin-top:2px;flex-shrink:0;accent-color:#0c4a6e;width:16px;height:16px}
.btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#15803d,#166534);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;margin:10px 0;cursor:pointer;box-shadow:0 4px 12px rgba(21,128,61,.3)}
.btn:active{transform:scale(.98)}

#report{display:none}
#report.show{display:block;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;overflow:auto;z-index:9999}
.actions{position:sticky;top:0;background:#fff;padding:12px 15px;border-bottom:2px solid #0c4a6e;z-index:10;display:flex;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.actions button{padding:11px 14px;font-size:13px;border:none;border-radius:8px;font-weight:700;cursor:pointer;flex:1}.actions button:disabled{opacity:.6}
.actions button.print{background:linear-gradient(135deg,#15803d,#166534);color:#fff}
.actions button.close{background:#64748b;color:#fff;flex:0 0 90px}

.doc{padding:15mm 12mm;max-width:210mm;margin:0 auto;background:#fff;font-family:‘Helvetica Neue’,Arial,sans-serif;color:#1a2332;font-size:9.5pt;line-height:1.45}

/* Refined corporate header */
.doc-hdr{display:table;width:100%;border-bottom:1.5px solid #0c4a6e;padding-bottom:6px;margin-bottom:4px}
.doc-hdr-l{display:table-cell;vertical-align:middle;width:70%}
.doc-hdr-r{display:table-cell;vertical-align:middle;width:30%;text-align:right}
.doc-hdr-r img{height:42px;width:auto}
.doc-hdr .ar{font-size:8pt;font-weight:600;color:#0c4a6e;direction:rtl;font-family:Arial,sans-serif}
.doc-hdr .en{font-size:6.5pt;color:#64748b;margin-top:1px;font-weight:400}
.doc-hdr .hosp{font-size:9pt;font-weight:700;color:#0c4a6e;margin-top:3px;letter-spacing:.3px}
.doc-hdr .dept{font-size:6.5pt;color:#64748b;font-style:italic;margin-top:1px}

/* Accent line under header */
.doc-accent{height:2px;background:linear-gradient(90deg,#0c4a6e 0%,#0ea5e9 50%,#0c4a6e 100%);margin-bottom:10px}

.doc h1{font-size:12pt;color:#0c4a6e;text-align:center;margin:4px 0 1px;letter-spacing:1.2px;font-weight:700}
.doc .subtitle{font-size:7pt;text-align:center;color:#64748b;font-style:italic;margin-bottom:2px;letter-spacing:.3px}
.doc .ref-line{font-size:6.5pt;text-align:center;color:#475569;border-top:1px solid #cbd5e1;border-bottom:1px solid #cbd5e1;padding:3px 6px;margin:4px 0 10px;background:#f8fafc;letter-spacing:.2px}

.doc h2{font-size:10pt;color:#fff;background:linear-gradient(90deg,#0c4a6e,#075985);padding:6px 12px;margin:0 0 8px;border-radius:3px;letter-spacing:.5px;page-break-after:avoid;break-after:avoid}
.doc .section{page-break-before:always;break-before:page;page-break-inside:avoid;break-inside:avoid;padding-top:8px}
.doc .section:first-of-type{page-break-before:auto;break-before:auto;padding-top:0}
.doc .section table{page-break-inside:avoid;break-inside:avoid}
.doc .section .row{page-break-inside:avoid;break-inside:avoid}
.doc h3{font-size:9.5pt;color:#0c4a6e;font-weight:700;border-bottom:1.5px solid #0ea5e9;padding:4px 0;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.3px}

.doc table{width:100%;border-collapse:collapse;margin:6px 0;font-size:8.5pt}
.doc td,.doc th{border:1px solid #cbd5e1;padding:5px 7px;text-align:left;vertical-align:top}
.doc th{background:linear-gradient(180deg,#0c4a6e,#075985);color:#fff;font-weight:700;font-size:8pt}
.doc .info-tbl td:first-child{font-weight:600;background:#f8fafc;width:33%}

.doc .row{display:flex;font-size:9pt;padding:4px 8px;border-bottom:1px solid #f1f5f9}
.doc .row b{flex:0 0 130px;color:#0c4a6e;font-weight:700}
.doc .row span{flex:1;color:#1a1a1a}

.doc .sev-box{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border:2px solid #15803d;border-radius:6px;padding:10px 14px;margin:6px 0}
.doc .sev-box .label{font-size:11pt;font-weight:700;color:#14532d}
.doc .sev-box .just{font-size:8.5pt;color:#1a1a1a;margin-top:5px;line-height:1.4}

.doc .cap-box{background:#fefce8;border-left:4px solid #ca8a04;padding:8px 12px;margin:6px 0;font-size:8.5pt}

.doc .fishbone-page{page-break-before:always;break-before:page;page-break-inside:avoid;break-inside:avoid;padding-top:10px}
.doc .fishbone{margin:8px auto;background:#ffffff;border:none;padding:0;text-align:center;page-break-inside:avoid;break-inside:avoid;max-width:580px;width:100%}
.doc .fishbone svg{max-width:100%;width:100%;height:auto;display:block;margin:0 auto}

.doc .sig-tbl td{padding:14px 8px;font-size:8.5pt;height:50px}
.doc .sig-tbl td b{display:block;font-size:8pt;color:#0c4a6e;margin-bottom:8px}
.doc .sig-tbl td .name{font-weight:700;font-size:9pt}
.doc .sig-tbl td .role{font-size:7.5pt;color:#64748b;font-style:italic}

.doc .footer{text-align:center;font-size:7pt;color:#94a3b8;margin-top:18px;padding-top:8px;border-top:1px solid #e2e8f0}

@media print{
#form{display:none}
.actions{display:none}
#report.show{position:static;padding:0}
body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.doc{padding:0;max-width:none;margin:0}
@page{size:A4;margin:12mm 10mm;/* removes URL and page numbers on iOS */}
.doc h2{break-after:avoid;page-break-after:avoid}
.doc h3{break-after:avoid;page-break-after:avoid}
.doc table{break-inside:avoid;page-break-inside:avoid}
.doc .fishbone{break-inside:avoid;page-break-inside:avoid}
.doc .sev-box{break-inside:avoid;page-break-inside:avoid}
.doc .cap-box{break-inside:avoid;page-break-inside:avoid}
}
</style></head><body>

ion></optgroup><optgroup label="Prescribing"><option value="24">Outside Privilege</option><option value="25">High-Alert</option><option value="26">Verbal Order</option><option value="27">CS Violation</option><option value="28">Non-Formulary</option><option value="29">Incomplete Rx</option><option value="30">Pediatric Dosing</option></optgroup><optgroup label="Transcribing"><option value="31">Transcription</option></optgroup><optgroup label="Monitoring"><option value="32">ADR Not Reported</option><option value="33">Doc Failure</option></optgroup><optgroup label="Dispensing"><option value="34">Incorrect Labeling</option><option value="35">Recalled Med</option></optgroup></select></div></div>

<div class="r rf"><div><label>Description</label><textarea id="notes" rows="2"></textarea></div></div>
<div class="r r3"><div><label>Date</label><input type="date" id="iD"></div><div><label>Time</label><input type="time" id="iT"></div><div><label>Shift</label><select id="sh"><option>PM</option><option>AM</option><option>Night</option></select></div></div></div>

<div class="c"><div class="ct">Corrective Action Plan (CAPA) Selection</div>
<label style="font-size:11px;color:#64748b;margin-bottom:6px">Select all applicable corrective actions:</label>
<div id="capaList" style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
<label class="capa-opt"><input type="checkbox" value="policy_distribution"> Forward the relevant policy to the Medical Director for distribution to all physicians and staff in the affected department</label>
<label class="capa-opt"><input type="checkbox" value="mandatory_cme"> Mandatory CME training with documented competency verification within 14 days</label>
<label class="capa-opt"><input type="checkbox" value="workflow_redesign"> Redesign of workflow with verification checkpoints within 30 days</label>
<label class="capa-opt"><input type="checkbox" value="double_check"> Implement mandatory independent double-check for high-risk steps</label>
<label class="capa-opt"><input type="checkbox" value="cpoe_bcma"> Escalate CPOE/BCMA/eMAR technology investment request to administration</label>
<label class="capa-opt"><input type="checkbox" value="monthly_audit"> Monthly compliance audit program with results reported to PT&amp;C</label>
<label class="capa-opt"><input type="checkbox" value="safety_huddle"> Daily safety huddles in the affected department for 30 days</label>
<label class="capa-opt"><input type="checkbox" value="staff_memo"> Formal memorandum distributed to all department staff within 72 hours</label>
<label class="capa-opt"><input type="checkbox" value="spsc_report"> SPSC portal incident reporting completed per MOH/MSPP/0007/01</label>
<label class="capa-opt"><input type="checkbox" value="staff_counseling"> Individual counseling and re-orientation for involved staff</label>
<label class="capa-opt"><input type="checkbox" value="root_cause_edu"> Department-wide education session on root cause findings</label>
<label class="capa-opt"><input type="checkbox" value="pt_committee"> Case presentation at the next Pharmacy &amp; Therapeutics Committee meeting</label>
<label class="capa-opt"><input type="checkbox" value="policy_review"> Review and update of departmental policy and procedures</label>
<label class="capa-opt"><input type="checkbox" value="kpi_tracking"> Establish KPI tracking for this error type with monthly reporting</label>
<label class="capa-opt"><input type="checkbox" value="patient_disclosure"> Patient and family disclosure conducted per disclosure policy</label>
<label class="capa-opt" style="border-color:#f59e0b;background:#fffbeb"><input type="checkbox" id="capaOtherChk" value="other"> <b>Other (specify below)</b></label>
<textarea id="capaOtherText" placeholder="Type custom corrective action(s)... (one per line)" style="display:none;min-height:70px;margin-top:4px;padding:8px;border:1.5px solid #f59e0b;border-radius:6px;font-size:12px;background:#fffbeb;font-family:inherit;width:100%;resize:vertical"></textarea>
</div>
</div>

<div class="c"><div class="ct">NCC MERP Severity</div>
<div class="r rf"><div><label>Category</label><select id="sev"><option value="0">Category A - Capacity to cause error</option><option value="1">Category B - Did not reach patient</option><option value="2">Category C - Reached patient, no harm</option><option value="3">Category D - Required monitoring</option><option value="4">Category E - Temporary harm</option><option value="5">Category F - Hospitalization</option><option value="6">Category G - Permanent harm</option><option value="7">Category H - Life-sustaining</option><option value="8">Category I - Death</option></select></div></div>
